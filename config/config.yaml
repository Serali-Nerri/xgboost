# CFST XGBoost Pipeline Configuration

# Data configuration
data:
  # Input data file path
  file_path: "data/raw/feature_parameters_unique.csv"

  # Target column name (label)
  target_column: "Nexp (kN)"

  # Target transformation configuration
  # ln(Nexp) transform to reduce impact of large values and improve COV
  target_transform:
    enabled: true
    type: "log"  # log, sqrt, none

  # Columns to drop (absolute geometric parameters)
  columns_to_drop:
    - "b (mm)"
    - "h (mm)"
    - "r0 (mm)"
    - "t (mm)"
    - "L (mm)"
    - "lambda"

  # Train-test split ratio
  test_size: 0.2

  # Random seed for reproducibility
  random_state: 42

# XGBoost model parameters
model:
  # XGBoost hyperparameters - baseline center point
  # These are now the single source of truth used by train.py.
  params:
    # Learning objective
    objective: "reg:squarederror"

    # Maximum depth of trees
    max_depth: 5

    # Learning rate
    learning_rate: 0.05

    # Number of boosting rounds
    n_estimators: 1200

    # Row subsampling
    subsample: 0.8

    # Column subsampling
    colsample_bytree: 0.75

    # Minimum child weight
    min_child_weight: 10

    # L1 regularization
    reg_alpha: 0.5

    # L2 regularization
    reg_lambda: 2.0

    # Minimum loss reduction
    gamma: 0.05

    # Random seed
    random_state: 42

    # Tree method
    tree_method: "hist"

    # Device (use cpu to avoid GPU dependency)
    device: "cpu"

    # Number of parallel threads
    n_jobs: -1

  # Optuna hyperparameter optimization switch
  use_optuna: true

  # Number of Optuna trials
  n_trials: 400

  # Optuna timeout (seconds)
  optuna_timeout: 14400  # 4 hours

  # Optuna storage URL
  optuna_storage_url: "sqlite:///logs/optuna_study.db"

  # Best params output path
  best_params_path: "logs/best_params.json"

  # Early stopping configuration (requires validation split)
  early_stopping_rounds: 100

  # Evaluation metric for validation monitoring
  eval_metric: "rmse"

  # Validation set split from training data (for early stopping)
  # Set to 0 to disable validation split
  validation_size: 0.15

# Cross-validation configuration
cv:
  # Number of folds
  n_splits: 5

  # Random seed for split
  random_state: 42

  # Shuffle data before splitting
  shuffle: true

# Paths configuration
paths:
  # Output directory for results
  output_dir: "output"

  # Directory for saved models
  model_dir: "models"

  # Model file name
  model_output: "xgboost_model.pkl"

  # Preprocessor file name
  preprocessor_output: "preprocessor.pkl"

  # Feature names file
  feature_names_output: "feature_names.json"

  # Training metadata file
  metadata_output: "training_metadata.json"

  # Feature importance plot
  feature_importance_plot: "feature_importance.png"

  # Predictions vs actual plot
  predictions_plot: "predictions_vs_actual.png"

  # Evaluation report
  evaluation_report: "evaluation_report.json"

  # Logs directory
  logs_dir: "logs"

# Logging configuration
logging:
  # Log level (DEBUG, INFO, WARNING, ERROR)
  level: "INFO"

  # Log format
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

  # Log file name
  file_name: "cfst_xgboost.log"
