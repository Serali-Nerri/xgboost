# 2026-03-11-new dataset candidate: global raw-target log-space model with scale-aware weighting and high-Npl ratio tail correction

data:
  file_path: "data/processed/2026.3.11-new_feature_parameters_raw.csv"
  target_column: "Nexp (kN)"
  target_mode: "raw"

  target_transform:
    enabled: true
    type: "log"

  columns_to_drop: []

  test_size: 0.2
  random_state: 42

  split:
    strategy: "regression_stratified"
    target_bins: 10
    auxiliary_features:
      - column: "lambda_bar"
        bins: 3
    min_stratum_size: 12

model:
  params:
    objective: "reg:squarederror"
    max_depth: 5
    learning_rate: 0.032557704737487175
    n_estimators: 4468
    subsample: 0.6545203978840765
    colsample_bytree: 0.5512277011503678
    min_child_weight: 5
    reg_alpha: 0.013217150723741274
    reg_lambda: 0.031029678277946865
    gamma: 0.000179818445655093
    random_state: 42
    tree_method: "hist"
    device: "cpu"
    n_jobs: -1

  use_optuna: false
  optuna_metric_space: "original"
  cv_metric_space: "original"
  n_trials: 200
  optuna_timeout: 14400
  optuna_storage_url: "sqlite:///logs/optuna_study.db"
  best_params_path: "logs/best_params_20260312_new_raw_target_log_full_numeric_weighted_tail_ratio.json"

  early_stopping_rounds: 100
  eval_metric: "rmse"
  validation_size: 0.15
  final_n_estimators_override: 4600
  selection_objective:
    metric_space: "original_nexp"
    rmse_normalizer: "mean_actual"
    cov_threshold: 0.10
    r2_threshold: 0.99
    cov_weight: 2.0
    r2_weight: 2.0

  sample_weighting:
    enabled: true
    mode: "tail_step"
    feature_column: "Npl (kN)"
    threshold_mode: "train_quantile"
    quantile: 0.7
    below_weight: 1.0
    above_weight: 2.0

  tail_residual_correction:
    enabled: true
    feature_column: "Npl (kN)"
    threshold_mode: "train_quantile"
    quantile: 0.85
    correction_mode: "ratio"
    append_global_prediction_features: true
    report_prediction_min: 0.0
    gating:
      mode: "hard"
    params:
      objective: "reg:squarederror"
      max_depth: 5
      learning_rate: 0.08
      n_estimators: 800
      subsample: 0.8
      colsample_bytree: 0.7
      min_child_weight: 6
      reg_alpha: 0.05
      reg_lambda: 0.1
      gamma: 0.0
      random_state: 42
      tree_method: "hist"
      device: "cpu"
      n_jobs: -1

cv:
  n_splits: 5
  random_state: 42
  shuffle: true

evaluation:
  regime_analysis:
    enabled: true
    reference_split: "train"
    sort_metric: "cov"
    regimes:
      - name: "axiality"
        mode: "categorical"
        source: "feature"
        column: "axial_flag"
      - name: "section_family"
        mode: "categorical"
        source: "feature"
        column: "section_family"
      - name: "slenderness_state"
        mode: "fixed_bins"
        source: "feature"
        column: "lambda_bar"
        edges: [0.0, 0.25, 0.5, 1.0, .inf]
        labels: ["very_stocky", "stocky", "intermediate", "slender"]
      - name: "scale_npl"
        mode: "train_quantile"
        source: "feature"
        column: "Npl (kN)"
        bins: 5
      - name: "eccentricity_severity"
        mode: "fixed_bins"
        source: "feature"
        column: "e/h"
        edges: [0.0, 0.0, 0.1, 0.3, .inf]
        labels: ["axial", "small_ecc", "moderate_ecc", "large_ecc"]
      - name: "confinement_level"
        mode: "fixed_bins"
        source: "feature"
        column: "xi"
        edges: [0.0, 0.5, 1.5, 3.0, .inf]
        labels: ["low_conf", "mid_conf", "high_conf", "very_high_conf"]
        bins: 4

paths:
  output_dir: "output/2026_03_11_new/raw_target_log_full_numeric_weighted_tail_ratio"
  model_dir: "models"
  model_output: "xgboost_model.pkl"
  preprocessor_output: "preprocessor.pkl"
  feature_names_output: "feature_names.json"
  metadata_output: "training_metadata.json"
  feature_importance_plot: "feature_importance.png"
  predictions_plot: "predictions_vs_actual.png"
  evaluation_report: "evaluation_report.json"
  logs_dir: "logs"

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file_name: "cfst_xgboost.log"
